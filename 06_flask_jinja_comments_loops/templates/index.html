<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Class X - DPS </title>
</head>
<body>
    <h1>The marks of the students is :</h1>
    <ul>
    {% for name, mark in marks.items() %}
        {% if mark>80 %}
            <li>{{name}} : {{mark}} - Good</li>
        {% else %}
            <li>{{name}} : {{mark}}</li>
        {% endif %}
    {% endfor %}
    </ul>
</body>
</html>
